<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>龍鳯 Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="hero">
      <img class="hero__image" src="assets/menu-hero.png" alt="A Sichuan restaurant table with fish hotpot, side dishes, rice, vegetables, and drinks">
      <div class="hero__shade"></div>
      <nav class="topbar" aria-label="Primary">
        <a class="brand" href="#top" aria-label="龍鳯 menu home">
          <span class="brand__mark">龍鳯</span>
          <span class="brand__text">龍鳯 Menu</span>
        </a>
        <a class="topbar__link" href="#menu">View Menu</a>
      </nav>
      <section class="hero__content" id="top">
        <p class="eyebrow">Restaurant menu for dine-in browsing</p>
        <h1>龍鳯 LoonFoon 菜单</h1>
        <p class="hero__copy">Sichuan fish pots, classic entrees, main dishes, vegetables, staple food, and drinks in one clean guest-facing menu.</p>
      </section>
    </header>

    <main id="menu" class="menu-shell">
      <section class="controls" aria-label="Menu controls">
        <div class="search">
          <label for="menuSearch">Search menu</label>
          <input id="menuSearch" type="search" placeholder="Search Chinese or English dish name">
        </div>
        <div class="category-tabs" id="categoryTabs" aria-label="Menu categories"></div>
      </section>

      <section class="menu-status" aria-live="polite">
        <span id="resultCount"></span>
        <button class="clear-button" id="clearSearch" type="button">Clear</button>
      </section>

      <section class="category-list" id="categoryList" aria-label="Restaurant menu categories"></section>
    </main>

    <footer class="footer">
      <p>菜单仅供浏览 · Menu for viewing only</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
